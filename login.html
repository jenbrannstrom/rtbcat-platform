<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat-Scan Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-size: 2rem;
            color: #1a1a2e;
        }
        .logo span {
            color: #e94560;
        }
        form { display: flex; flex-direction: column; gap: 1.25rem; }
        label {
            font-weight: 500;
            color: #333;
            margin-bottom: 0.25rem;
            display: block;
        }
        input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #e94560;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        button:hover { background: #d63651; }
        .error {
            background: #fee;
            color: #c00;
            padding: 0.75rem;
            border-radius: 6px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Cat<span>-Scan</span></h1>
            <p style="color: #666; margin-top: 0.5rem;">QPS Optimizer</p>
        </div>
        <div class="error" id="error">Invalid credentials</div>
        <form id="loginForm" action="/" method="GET">
            <div>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
    <script>
        // Simple hash function for client-side verification
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Expected hash of credentials (set via build or keep in sync with CATSCAN_AUTH_COOKIE env var)
        const VALID_HASH = 'a834abe4142946fee8c97f9fed8b6d06c192f37a37657a6f3e86998d4e306cd5';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';

            // Hash the credentials
            const hash = await sha256(user + ':' + pass);

            if (hash === VALID_HASH) {
                // Set auth cookie (expires in 30 days)
                const expires = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toUTCString();
                document.cookie = `catscan_auth=${hash}; expires=${expires}; path=/; secure; samesite=strict`;
                window.location.href = '/';
            } else {
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
