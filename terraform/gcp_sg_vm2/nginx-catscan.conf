# Cat-Scan Nginx Configuration for VM2
# Authentication is handled by the app via its own login page + session cookies.
# OAuth2 Proxy remains available for Google SSO flow.
#
# Install: sudo cp nginx-catscan.conf /etc/nginx/sites-enabled/catscan
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx

server {
    server_name vm2.scan.rtb.cat;

    # Allow large CSV uploads for imports (avoid 413)
    client_max_body_size 200m;

    # Option A (email/password first): block SSO entrypoints to prevent loops
    location = /oauth2/sign_in {
        return 302 /login?error=Google+login+is+disabled+on+VM2;
    }

    location = /api/auth/authing/login {
        return 302 /login?error=Authing+login+is+disabled+on+VM2;
    }

    # OAuth2 Proxy endpoints (handles Google login flow)
    location /oauth2/ {
        proxy_pass http://127.0.0.1:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # OAuth2 Proxy auth check (internal)
    location = /oauth2/auth {
        proxy_pass http://127.0.0.1:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
    }

    # Health check (no auth required - for load balancers/monitoring)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # Precompute endpoints - allow scheduler/monitoring with secret headers
    location = /api/precompute/refresh/scheduled {
        proxy_pass http://127.0.0.1:8000/precompute/refresh/scheduled;
        proxy_set_header Host $host;
    }

    location = /api/precompute/health {
        proxy_pass http://127.0.0.1:8000/precompute/health;
        proxy_set_header Host $host;
    }

    # Auth API endpoints - publicly accessible (login, register, callback, check)
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # API routes - app handles auth via session cookies
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # Timeouts for long operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Dashboard - app handles auth (redirects to /login if not authenticated)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # TLS - managed by Certbot (run: sudo certbot --nginx -d vm2.scan.rtb.cat)
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vm2.scan.rtb.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vm2.scan.rtb.cat/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

}


server {
    if ($host = vm2.scan.rtb.cat) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name vm2.scan.rtb.cat;
    return 404;

}
