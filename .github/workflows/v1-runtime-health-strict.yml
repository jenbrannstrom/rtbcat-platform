name: v1 Runtime Health Strict
run-name: >-
  v1 Runtime Health Strict (buyer=${{ github.event.inputs.buyer_id || vars.CATSCAN_RUNTIME_HEALTH_PILOT_BUYER_ID || '1111111111' }}, profile=${{ github.event.inputs.canary_profile || vars.CATSCAN_RUNTIME_HEALTH_CANARY_PROFILE || 'balanced' }})

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API base URL (include /api path)"
        required: true
        default: "https://your-deployment.example.com/api"
      buyer_id:
        description: "Optional buyer_id scope"
        required: false
        default: ""
      model_id:
        description: "Optional model_id override"
        required: false
        default: ""
      canary_profile:
        description: "Workflow guardrail profile for score+propose checks"
        required: true
        type: choice
        default: "balanced"
        options:
          - safe
          - balanced
          - aggressive
      qps_page_slo_since_hours:
        description: "Lookback window for strict QPS page SLO canary"
        required: true
        default: "24"
      bidstream_dimension_waiver_json:
        description: "Optional JSON waiver for buyers with known 100% missing bidstream dimensions"
        required: false
        default: ""
      conversion_readiness_waiver_json:
        description: "Optional JSON waiver for buyers with known conversion-readiness gaps"
        required: false
        default: ""
      canary_timeout_seconds:
        description: "Per-request timeout for canary HTTP calls (seconds)"
        required: false
        default: "240"
  schedule:
    - cron: "35 3 * * *"

concurrency:
  group: v1-runtime-health-strict-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  runtime-health-strict:
    name: Run runtime-health strict canary gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CATSCAN_API_BASE_URL: ${{ github.event.inputs.api_base_url || vars.CATSCAN_RUNTIME_HEALTH_API_BASE_URL || 'https://your-deployment.example.com/api' }}
      CATSCAN_BUYER_ID: ${{ github.event.inputs.buyer_id || vars.CATSCAN_RUNTIME_HEALTH_PILOT_BUYER_ID || '1111111111' }}
      CATSCAN_MODEL_ID: ${{ github.event.inputs.model_id || vars.CATSCAN_RUNTIME_HEALTH_MODEL_ID || '' }}
      CATSCAN_CANARY_PROFILE: ${{ github.event.inputs.canary_profile || vars.CATSCAN_RUNTIME_HEALTH_CANARY_PROFILE || 'balanced' }}
      CATSCAN_CANARY_QPS_PAGE_SLO_SINCE_HOURS: ${{ github.event.inputs.qps_page_slo_since_hours || vars.CATSCAN_RUNTIME_HEALTH_QPS_PAGE_SLO_SINCE_HOURS || '168' }}
      CATSCAN_CANARY_MAX_HOME_ENDPOINT_EFFICIENCY_LATENCY_MS: ${{ vars.CATSCAN_RUNTIME_HEALTH_MAX_HOME_ENDPOINT_EFFICIENCY_LATENCY_MS || '12000' }}
      CATSCAN_RUNTIME_HEALTH_ENDPOINT_EFFICIENCY_BUDGET_WAIVER_EXPIRES_ON: ${{ vars.CATSCAN_RUNTIME_HEALTH_ENDPOINT_EFFICIENCY_BUDGET_WAIVER_EXPIRES_ON || '2026-03-12' }}
      CATSCAN_CANARY_BIDSTREAM_DIMENSION_WAIVER_JSON: ${{ github.event.inputs.bidstream_dimension_waiver_json || vars.CATSCAN_RUNTIME_HEALTH_BIDSTREAM_WAIVER_JSON || '[{"buyer_id":"1111111111","expires_on":"2026-06-30","note":"Google RTB source for this buyer does not provide platform/environment/transaction_type dimensions","allow_unavailable":true,"allow_zero_rows":true,"allow_all_dimensions_missing":true,"allow_report_completeness_degraded":true,"allow_seat_day_completeness_degraded":true,"allow_seat_day_zero_rows":true}]' }}
      CATSCAN_CANARY_CONVERSION_READINESS_WAIVER_JSON: ${{ github.event.inputs.conversion_readiness_waiver_json || vars.CATSCAN_RUNTIME_HEALTH_CONVERSION_READINESS_WAIVER_JSON || '' }}
      CATSCAN_CANARY_TIMEOUT_SECONDS: ${{ github.event.inputs.canary_timeout_seconds || vars.CATSCAN_RUNTIME_HEALTH_TIMEOUT_SECONDS || '240' }}
      CATSCAN_BEARER_TOKEN: ${{ secrets.CATSCAN_CANARY_BEARER_TOKEN }}
      CATSCAN_SESSION_COOKIE: ${{ secrets.CATSCAN_CANARY_SESSION_COOKIE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate canary auth inputs
        run: |
          if [[ -z "${CATSCAN_BEARER_TOKEN:-}" && -z "${CATSCAN_SESSION_COOKIE:-}" ]]; then
            echo "Set CATSCAN_CANARY_BEARER_TOKEN or CATSCAN_CANARY_SESSION_COOKIE in repository secrets." >&2
            exit 1
          fi

      - name: Enforce endpoint-efficiency budget waiver expiry
        run: |
          budget="${CATSCAN_CANARY_MAX_HOME_ENDPOINT_EFFICIENCY_LATENCY_MS}"
          expiry="${CATSCAN_RUNTIME_HEALTH_ENDPOINT_EFFICIENCY_BUDGET_WAIVER_EXPIRES_ON}"
          today="$(date -u +%Y-%m-%d)"

          if ! [[ "${budget}" =~ ^[0-9]+$ ]]; then
            echo "Invalid CATSCAN_CANARY_MAX_HOME_ENDPOINT_EFFICIENCY_LATENCY_MS='${budget}'" >&2
            exit 1
          fi

          if (( budget > 12000 )); then
            echo "Temporary endpoint-efficiency budget override detected: ${budget}ms (baseline=12000ms)"
            if [[ "${today}" > "${expiry}" ]]; then
              echo "FAIL: budget override expired on ${expiry}; set budget back to 12000ms." >&2
              exit 1
            fi
            echo "WARN: override valid until ${expiry}; keep time-boxed and revert on schedule."
          fi

      - name: Run runtime-health strict gate
        run: bash scripts/run_v1_runtime_health_local.sh

      - name: Publish runtime-health summary
        if: always()
        run: |
          if [[ -f /tmp/v1_runtime_health_last_run.md ]]; then
            cat /tmp/v1_runtime_health_last_run.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Runtime-health report file missing: /tmp/v1_runtime_health_last_run.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload runtime-health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1-runtime-health-strict-report
          path: |
            /tmp/v1_runtime_health_last_run.md
            /tmp/v1_runtime_health_last_run.json
          if-no-files-found: error
