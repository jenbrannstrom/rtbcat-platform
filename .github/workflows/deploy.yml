name: CD Manual Deploy to GCP

# MANUAL TRIGGER ONLY - Do NOT add push triggers!
# Auto-deploy on push caused incidents (Jan 2026) when it competed
# with manual SSH deployments, corrupting containers and losing data.
on:
  workflow_dispatch:  # Manual trigger only - click "Run workflow" in GitHub
    inputs:
      target:
        description: "Deploy target. Deploy to staging first, verify, then production."
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type DEPLOY to confirm this manual deployment."
        required: true
        default: ""
      reason:
        description: "Reason for this deployment (ticket/incident/context)."
        required: false
        default: ""
      health_wait_seconds:
        description: "Max wait for API health after deploy (seconds)."
        required: false
        default: "120"
      run_contract_check:
        description: "Run post-deploy contract check gate."
        required: false
        type: boolean
        default: true

# Prevent concurrent deployments to the same VM
concurrency:
  group: cd-manual-deploy-${{ github.event.inputs.target }}
  cancel-in-progress: true

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_ZONE: ${{ vars.GCP_ZONE || '' }}
  APP_DIR: ${{ vars.APP_DIR || '/opt/catscan' }}
  GIT_BRANCH: ${{ vars.GIT_BRANCH || 'unified-platform' }}
  IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || '' }}
  ALLOW_CONTRACT_FAILURE: ${{ vars.ALLOW_CONTRACT_FAILURE || 'false' }}
  CATSCAN_ENABLE_GMAIL_IMPORT_SCHEDULER: ${{ vars.CATSCAN_ENABLE_GMAIL_IMPORT_SCHEDULER || 'true' }}
  CATSCAN_ENABLE_PRECOMPUTE_SCHEDULER: ${{ vars.CATSCAN_ENABLE_PRECOMPUTE_SCHEDULER || 'true' }}
  CATSCAN_ENABLE_CREATIVE_CACHE_SCHEDULER: ${{ vars.CATSCAN_ENABLE_CREATIVE_CACHE_SCHEDULER || 'true' }}
  CATSCAN_ENABLE_LANGUAGE_AI: ${{ vars.CATSCAN_ENABLE_LANGUAGE_AI || 'false' }}
  CATSCAN_ENABLE_CLUSTERING_AI: ${{ vars.CATSCAN_ENABLE_CLUSTERING_AI || 'false' }}
  CATSCAN_REQUIRE_OAUTH_CLIENT_SECRET_IN_API: ${{ vars.CATSCAN_REQUIRE_OAUTH_CLIENT_SECRET_IN_API || 'false' }}
  SECRETS_HEALTH_STRICT: ${{ vars.SECRETS_HEALTH_STRICT || 'false' }}

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
    name: Deploy to ${{ github.event.inputs.target }}
    environment: ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest

    env:
      VM_NAME: ${{ github.event.inputs.target == 'production' && vars.GCP_VM_NAME_PROD || vars.GCP_VM_NAME_STAGING }}

    steps:
      - name: Show deployment intent
        run: |
          echo "Manual deploy approved."
          echo "Target: ${{ github.event.inputs.target }} (${{ env.VM_NAME }})"
          echo "Reason: ${{ github.event.inputs.reason }}"

      - name: Validate deploy settings
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=0

          if [[ -z "${GCP_PROJECT}" ]]; then
            echo "Missing required Actions variable: GCP_PROJECT" >&2
            missing=1
          fi
          if [[ -z "${GCP_ZONE}" ]]; then
            echo "Missing required Actions variable: GCP_ZONE" >&2
            missing=1
          fi
          if [[ -z "${IMAGE_REGISTRY}" ]]; then
            echo "Missing required Actions variable: IMAGE_REGISTRY" >&2
            missing=1
          fi
          if [[ -z "${VM_NAME}" ]]; then
            echo "Missing required Actions variable for target VM name (GCP_VM_NAME_PROD/GCP_VM_NAME_STAGING)" >&2
            missing=1
          fi
          if [[ -z "${GCP_SA_KEY}" ]]; then
            echo "Missing required Actions secret: GCP_SA_KEY" >&2
            missing=1
          fi

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Deploy to VM via IAP tunnel
        run: |
          # Get the short SHA for image tag
          SHORT_SHA="${GITHUB_SHA::7}"

          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              cd ${{ env.APP_DIR }}

              # Pull latest code (for docker-compose.gcp.yml updates)
              sudo -u catscan git fetch origin
              sudo -u catscan git checkout ${{ env.GIT_BRANCH }}
              sudo -u catscan git reset --hard origin/${{ env.GIT_BRANCH }}

              # Set image registry and tag for prebuilt images
              export IMAGE_REGISTRY=${{ env.IMAGE_REGISTRY }}
              export IMAGE_TAG=sha-${SHORT_SHA}
              REGISTRY_HOST=\$(echo \"${{ env.IMAGE_REGISTRY }}\" | cut -d/ -f1)
              if [ -z \"\$REGISTRY_HOST\" ]; then
                echo 'FAIL: Could not parse registry host from IMAGE_REGISTRY'
                exit 1
              fi
              export CATSCAN_ENABLE_GMAIL_IMPORT_SCHEDULER='${{ env.CATSCAN_ENABLE_GMAIL_IMPORT_SCHEDULER }}'
              export CATSCAN_ENABLE_PRECOMPUTE_SCHEDULER='${{ env.CATSCAN_ENABLE_PRECOMPUTE_SCHEDULER }}'
              export CATSCAN_ENABLE_CREATIVE_CACHE_SCHEDULER='${{ env.CATSCAN_ENABLE_CREATIVE_CACHE_SCHEDULER }}'
              export CATSCAN_ENABLE_LANGUAGE_AI='${{ env.CATSCAN_ENABLE_LANGUAGE_AI }}'
              export CATSCAN_ENABLE_CLUSTERING_AI='${{ env.CATSCAN_ENABLE_CLUSTERING_AI }}'
              export CATSCAN_REQUIRE_OAUTH_CLIENT_SECRET_IN_API='${{ env.CATSCAN_REQUIRE_OAUTH_CLIENT_SECRET_IN_API }}'
              export SECRETS_HEALTH_STRICT='${{ env.SECRETS_HEALTH_STRICT }}'

              echo \"Deploying version: \$(cat VERSION) (sha-${SHORT_SHA})\"

              # Refresh Artifact Registry auth via VM instance metadata token.
              # This avoids dependency on root's gcloud auth or credHelper state,
              # which can go stale and cause 'denied: Unauthenticated request' on pull.
              # We write a clean DOCKER_CONFIG to bypass any credHelper that would
              # override docker login credentials.
              AR_TOKEN=\$(curl -sf -H 'Metadata-Flavor: Google' \
                'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
                | jq -r .access_token)
              if [ -z \"\$AR_TOKEN\" ] || [ \"\$AR_TOKEN\" = \"null\" ]; then
                echo 'FAIL: Could not obtain metadata token for Artifact Registry auth'
                exit 1
              fi
              AR_AUTH=\$(echo -n \"oauth2accesstoken:\$AR_TOKEN\" | base64 -w0)
              sudo mkdir -p /tmp/ar-docker-config
              echo \"{\\\"auths\\\":{\\\"https://\$REGISTRY_HOST\\\":{\\\"auth\\\":\\\"\$AR_AUTH\\\"}}}\" \
                | sudo tee /tmp/ar-docker-config/config.json >/dev/null
              export DOCKER_CONFIG=/tmp/ar-docker-config
              echo '✓ Artifact Registry auth refreshed via VM metadata token'

              # Pull prebuilt images from Artifact Registry (no building on VM)
              sudo -E docker compose -f docker-compose.gcp.yml pull
              if [ \$? -ne 0 ]; then
                echo 'FAIL: docker compose pull failed'
                exit 1
              fi
              echo '✓ Docker image pull from Artifact Registry succeeded'

              # Start containers with new images
              sudo -E docker compose -f docker-compose.gcp.yml up -d --force-recreate

              # Clean up old docker images to prevent disk filling up
              sudo docker image prune -f
              sudo docker container prune -f

              echo 'Deployment complete!'
            "

      - name: Verify deployment
        run: |
          MAX_WAIT_SECONDS="${{ github.event.inputs.health_wait_seconds }}"
          if ! [[ "$MAX_WAIT_SECONDS" =~ ^[0-9]+$ ]] || [ "$MAX_WAIT_SECONDS" -lt 10 ]; then
            MAX_WAIT_SECONDS=120
          fi
          POLL_SECONDS=5
          ATTEMPTS=$(( (MAX_WAIT_SECONDS + POLL_SECONDS - 1) / POLL_SECONDS ))

          # Health check with early-exit polling.
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              MAX_ATTEMPTS=${ATTEMPTS}
              POLL_SECONDS=${POLL_SECONDS}
              success=0
              for i in \$(seq 1 \${MAX_ATTEMPTS}); do
                if curl -sf http://localhost:8000/health >/tmp/catscan_health.json; then
                  echo \"API healthy after attempt \${i}/\${MAX_ATTEMPTS}\"
                  cat /tmp/catscan_health.json
                  success=1
                  break
                fi
                echo \"Waiting for API health... attempt \${i}/\${MAX_ATTEMPTS}\"
                sleep \${POLL_SECONDS}
              done

              if [ \${success} -ne 1 ]; then
                echo \"FAIL: API not responding within ${MAX_WAIT_SECONDS}s\"
                sudo docker ps
                exit 1
              fi

              if ! curl -sf http://localhost:8000/system/secrets-health >/tmp/catscan_secrets_health.json; then
                echo \"FAIL: /system/secrets-health not responding after deploy\"
                sudo docker ps
                exit 1
              fi

              if ! python3 -c 'import json,sys; payload=json.load(open(\"/tmp/catscan_secrets_health.json\")); summary=payload.get(\"summary\") or {}; print(\"secrets_health_healthy={}\".format(payload.get(\"healthy\"))); print(\"secrets_health_strict_mode={}\".format(payload.get(\"strict_mode\"))); print(\"secrets_health_enabled_features={}\".format(summary.get(\"enabled_features\"))); print(\"secrets_health_required_keys={}\".format(summary.get(\"required_keys\"))); print(\"secrets_health_missing_keys_count={}\".format(summary.get(\"missing_keys\"))); missing=payload.get(\"missing_required_keys\") or []; print(\"secrets_health_missing_keys={}\".format(\",\".join(missing))); sys.exit(0 if payload.get(\"healthy\") else 1)'; then
                echo \"FAIL: /system/secrets-health reports missing required secrets for enabled features\"
                cat /tmp/catscan_secrets_health.json
                sudo docker ps
                exit 1
              fi

              sudo docker ps
            "

      - name: Post-deploy contract check
        if: ${{ github.event.inputs.run_contract_check != 'false' }}
        id: contracts
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          ARTIFACT_NAME="contracts_${SHORT_SHA}_${{ env.VM_NAME }}_${TIMESTAMP}.json"
          ARTIFACT_PATH="/tmp/${ARTIFACT_NAME}"
          echo "ARTIFACT_PATH=${ARTIFACT_PATH}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

          echo "::group::Contract check (${ARTIFACT_NAME})"

          set +e
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              sudo docker exec catscan-api python /app/scripts/contracts_check.py \
                --days 7 \
                --db-dsn-env POSTGRES_DSN \
                --json-out /tmp/contracts_post_deploy.json
            "
          CHECK_EXIT=$?
          set -e

          # Copy JSON artifact from VM
          set +e
          gcloud compute scp ${{ env.VM_NAME }}:/tmp/contracts_post_deploy.json \
            "${ARTIFACT_PATH}" \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" 2>/dev/null
          SCP_EXIT=$?
          set -e

          if [ "$SCP_EXIT" -ne 0 ] || [ ! -f "${ARTIFACT_PATH}" ]; then
            echo "::warning::SCP copy failed (exit ${SCP_EXIT}). Writing fallback artifact."
            cat > "${ARTIFACT_PATH}" <<FALLBACK
          {
            "timestamp": "${TIMESTAMP}",
            "vm": "${{ env.VM_NAME }}",
            "sha": "${SHORT_SHA}",
            "check_exit": ${CHECK_EXIT},
            "error": "artifact_copy_failed",
            "note": "Contract JSON could not be copied from VM. Gate status decided by check_exit and ALLOW_CONTRACT_FAILURE flag."
          }
          FALLBACK
          fi

          echo "::endgroup::"
          echo "Contract JSON artifact: ${ARTIFACT_PATH}"

          if [ "$CHECK_EXIT" -ne 0 ]; then
            if [ "${{ env.ALLOW_CONTRACT_FAILURE }}" = "true" ]; then
              echo "::warning::CONTRACT CHECK FAILED (exit ${CHECK_EXIT}) — BYPASSED via ALLOW_CONTRACT_FAILURE=true"
              echo "::warning::This bypass must be temporary. Remove ALLOW_CONTRACT_FAILURE after investigation."
            else
              echo "::error::CONTRACT CHECK FAILED (exit ${CHECK_EXIT}). Deploy blocked."
              echo "::error::Set repository variable ALLOW_CONTRACT_FAILURE=true to bypass (temporary only)."
              exit 1
            fi
          fi

      - name: Upload contract check artifact
        if: ${{ always() && github.event.inputs.run_contract_check != 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: contracts-${{ env.VM_NAME }}-${{ github.sha }}
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 90
          if-no-files-found: warn
