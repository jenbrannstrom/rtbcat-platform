name: Deploy to GCP

# MANUAL TRIGGER ONLY - Do NOT add push triggers!
# Auto-deploy on push caused incidents (Jan 2026) when it competed
# with manual SSH deployments, corrupting containers and losing data.
on:
  workflow_dispatch:  # Manual trigger only - click "Run workflow" in GitHub
    inputs:
      image_tag:
        description: "Image tag to deploy (default: sha-<commit>)"
        required: false
        type: string
      image_registry:
        description: "Override image registry (default: Artifact Registry)"
        required: false
        type: string

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: true

# Configuration via GitHub repository variables (Settings > Secrets and variables > Actions > Variables)
# This allows forks to use their own infrastructure without modifying the workflow file.
# Required variables: GCP_PROJECT, GCP_SA_KEY (secret)
# Optional variables: GCP_ZONE, VM_NAME, APP_DIR, GIT_BRANCH
env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_ZONE: ${{ vars.GCP_ZONE || 'europe-west1-b' }}
  VM_NAME: ${{ vars.VM_NAME || 'catscan-production' }}
  APP_DIR: ${{ vars.APP_DIR || '/opt/catscan' }}
  GIT_BRANCH: ${{ vars.GIT_BRANCH || 'unified-platform' }}
  PROJECT_ID: ${{ vars.GCP_PROJECT || 'catscan-prod-202601' }}
  REGION: europe-west1
  REPOSITORY: catscan
  REGISTRY_HOST: europe-west1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Deploy to VM via IAP tunnel
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              cd ${{ env.APP_DIR }}

              # Pull latest code (docker-compose.gcp.yml + config)
              sudo -u catscan git fetch origin
              sudo -u catscan git checkout ${{ env.GIT_BRANCH }}
              sudo -u catscan git reset --hard origin/${{ env.GIT_BRANCH }}

              # Resolve image tag/registry (pin exact image)
              IMAGE_TAG_INPUT='${{ github.event.inputs.image_tag }}'
              IMAGE_REGISTRY_INPUT='${{ github.event.inputs.image_registry }}'
              if [ -z \"\$IMAGE_TAG_INPUT\" ]; then
                IMAGE_TAG_INPUT=sha-${GITHUB_SHA::7}
              fi
              if [ -z \"\$IMAGE_REGISTRY_INPUT\" ]; then
                IMAGE_REGISTRY_INPUT=${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}
              fi
              echo \"Deploying image: \$IMAGE_REGISTRY_INPUT (tag \$IMAGE_TAG_INPUT)\"

              # Persist pinned image tag in .env
              sudo bash -c 'touch .env'
              sudo bash -c \"grep -v '^IMAGE_TAG=' .env > .env.tmp || true\"
              sudo bash -c \"grep -v '^IMAGE_REGISTRY=' .env.tmp > .env.tmp2 || true\"
              sudo bash -c \"printf '%s\n' 'IMAGE_TAG=\$IMAGE_TAG_INPUT' 'IMAGE_REGISTRY=\$IMAGE_REGISTRY_INPUT' >> .env.tmp2\"
              sudo bash -c 'mv .env.tmp2 .env'
              sudo rm -f .env.tmp

              # Only stop the app containers (not build processes)
              sudo docker compose -f docker-compose.gcp.yml down --remove-orphans 2>/dev/null || true

              # Pull pinned images and start without rebuilding
              sudo docker compose -f docker-compose.gcp.yml pull
              sudo docker compose -f docker-compose.gcp.yml up -d --no-build --force-recreate

              # Clean up old docker images to prevent disk filling up
              # SAFE: only removes unused images, never volumes
              sudo docker image prune -f
              sudo docker container prune -f

              echo 'Deployment complete!'
            "

      - name: Verify deployment
        run: |
          # Wait for services to start (build can take time on the VM)
          sleep 60

          # Health check
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              curl -s http://localhost:8000/health || echo 'API not responding yet'
              sudo docker ps
            "
