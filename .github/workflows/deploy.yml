name: CD Manual Deploy to GCP

# MANUAL TRIGGER ONLY - Do NOT add push triggers!
# Auto-deploy on push caused incidents (Jan 2026) when it competed
# with manual SSH deployments, corrupting containers and losing data.
on:
  workflow_dispatch:  # Manual trigger only - click "Run workflow" in GitHub
    inputs:
      target:
        description: "Deploy target. Deploy to staging first, verify, then production."
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type DEPLOY to confirm this manual deployment."
        required: true
        default: ""
      reason:
        description: "Reason for this deployment (ticket/incident/context)."
        required: false
        default: ""
      health_wait_seconds:
        description: "Max wait for API health after deploy (seconds)."
        required: false
        default: "120"
      image_wait_seconds:
        description: "Max wait for api/dashboard images to exist in Artifact Registry (seconds)."
        required: false
        default: "300"
      run_contract_check:
        description: "Run post-deploy contract check gate."
        required: false
        type: boolean
        default: true
      staging_verification_notes:
        description: "For production promotion: brief note on what was verified on vm2."
        required: false
        default: ""

# Prevent concurrent deployments to the same VM
concurrency:
  group: cd-manual-deploy-${{ github.event.inputs.target }}
  cancel-in-progress: true

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  GCP_VM_PRODUCTION: ${{ vars.GCP_VM_PRODUCTION }}
  GCP_VM_STAGING: ${{ vars.GCP_VM_STAGING }}
  CLOUDSQL_INSTANCE_NAME: ${{ vars.CLOUDSQL_INSTANCE }}
  CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME }}
  APP_DIR: ${{ vars.APP_DIR || '/opt/catscan' }}
  GIT_BRANCH: ${{ vars.GIT_BRANCH || 'main' }}
  GIT_REMOTE_URL: ${{ vars.GIT_REMOTE_URL || 'https://github.com/jenbrannstrom/rtbcat-platform.git' }}
  IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
  STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL || 'https://vm2.scan.rtb.cat/api' }}
  PRODUCTION_API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL || 'https://scan.rtb.cat/api' }}
  ALLOW_CONTRACT_FAILURE: ${{ vars.ALLOW_CONTRACT_FAILURE || 'false' }}
  CATSCAN_ENABLE_GMAIL_IMPORT_SCHEDULER: ${{ vars.CATSCAN_ENABLE_GMAIL_IMPORT_SCHEDULER || 'true' }}
  CATSCAN_ENABLE_PRECOMPUTE_SCHEDULER: ${{ vars.CATSCAN_ENABLE_PRECOMPUTE_SCHEDULER || 'true' }}
  CATSCAN_ENABLE_CREATIVE_CACHE_SCHEDULER: ${{ vars.CATSCAN_ENABLE_CREATIVE_CACHE_SCHEDULER || 'true' }}
  CATSCAN_ENABLE_LANGUAGE_AI: ${{ vars.CATSCAN_ENABLE_LANGUAGE_AI || 'false' }}
  CATSCAN_ENABLE_CLUSTERING_AI: ${{ vars.CATSCAN_ENABLE_CLUSTERING_AI || 'false' }}
  CATSCAN_REQUIRE_OAUTH_CLIENT_SECRET_IN_API: ${{ vars.CATSCAN_REQUIRE_OAUTH_CLIENT_SECRET_IN_API || 'false' }}
  SECRETS_HEALTH_STRICT: ${{ vars.SECRETS_HEALTH_STRICT || 'false' }}

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
    name: Deploy to ${{ github.event.inputs.target }}
    environment: ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail
          for var_name in GCP_PROJECT GCP_REGION GCP_ZONE GCP_VM_PRODUCTION GCP_VM_STAGING IMAGE_REGISTRY CLOUDSQL_INSTANCE_NAME GIT_REMOTE_URL; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required repository variable: ${var_name}"
              exit 1
            fi
          done

      - name: Set VM name
        id: vm
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ]; then
            echo "name=${{ env.GCP_VM_PRODUCTION }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.GCP_VM_STAGING }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show deployment intent
        run: |
          echo "Manual deploy approved."
          echo "Target: ${{ github.event.inputs.target }} (${{ steps.vm.outputs.name }})"
          echo "Reason: ${{ github.event.inputs.reason }}"

      - name: Require staging verification before production
        if: ${{ github.event.inputs.target == 'production' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ github.event.inputs.staging_verification_notes }}" ]; then
            echo "Production promotion requires staging verification notes."
            echo "Re-run this workflow and fill in staging_verification_notes with what was tested on vm2."
            exit 1
          fi

          EXPECTED_SHORT_SHA="${GITHUB_SHA::7}"
          STAGING_HEALTH_URL="${{ env.STAGING_API_BASE_URL }}/health"

          echo "Checking staging health at ${STAGING_HEALTH_URL}"
          RESPONSE="$(curl -fsSL "${STAGING_HEALTH_URL}")"
          echo "${RESPONSE}"

          python3 - "${RESPONSE}" "${EXPECTED_SHORT_SHA}" <<'PY'
          import json
          import sys

          payload = json.loads(sys.argv[1])
          expected = sys.argv[2].lower()
          status = str(payload.get("status") or "")
          version = str(payload.get("version") or "")
          git_sha = str(payload.get("git_sha") or "").lower()

          if status != "healthy":
              raise SystemExit("Staging is not healthy")

          if not (version == f"sha-{expected}" or git_sha.startswith(expected)):
              current = version or git_sha or "unknown"
              raise SystemExit(
                  f"Staging is running {current}, expected sha-{expected}"
              )
          PY

          echo "Verified staging is healthy on sha-${EXPECTED_SHORT_SHA}"
          echo "Verification notes: ${{ github.event.inputs.staging_verification_notes }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Wait for tagged images
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="sha-${SHORT_SHA}"
          MAX_WAIT_SECONDS="${{ github.event.inputs.image_wait_seconds }}"
          if ! [[ "$MAX_WAIT_SECONDS" =~ ^[0-9]+$ ]] || [ "$MAX_WAIT_SECONDS" -lt 30 ]; then
            MAX_WAIT_SECONDS=300
          fi
          POLL_SECONDS=10
          ATTEMPTS=$(( (MAX_WAIT_SECONDS + POLL_SECONDS - 1) / POLL_SECONDS ))

          check_image() {
            local image_ref="$1"
            gcloud artifacts docker images describe "$image_ref" --project="${GCP_PROJECT}" >/dev/null 2>&1
          }

          API_IMAGE="${IMAGE_REGISTRY}/catscan-api:${IMAGE_TAG}"
          DASHBOARD_IMAGE="${IMAGE_REGISTRY}/catscan-dashboard:${IMAGE_TAG}"

          for i in $(seq 1 "${ATTEMPTS}"); do
            api_ready=0
            dashboard_ready=0
            if check_image "${API_IMAGE}"; then
              api_ready=1
            fi
            if check_image "${DASHBOARD_IMAGE}"; then
              dashboard_ready=1
            fi

            if [ "${api_ready}" -eq 1 ] && [ "${dashboard_ready}" -eq 1 ]; then
              echo "Images available:"
              echo "  - ${API_IMAGE}"
              echo "  - ${DASHBOARD_IMAGE}"
              exit 0
            fi

            echo "Waiting for images (attempt ${i}/${ATTEMPTS})"
            echo "  api ready: ${api_ready}"
            echo "  dashboard ready: ${dashboard_ready}"
            sleep "${POLL_SECONDS}"
          done

          echo "Timed out waiting for tagged images in Artifact Registry."
          echo "Expected:"
          echo "  - ${API_IMAGE}"
          echo "  - ${DASHBOARD_IMAGE}"
          exit 1

      - name: Deploy to VM via IAP tunnel
        run: |
          # Get the short SHA for image tag
          SHORT_SHA="${GITHUB_SHA::7}"
          CLOUDSQL_CONNECTION_NAME="${{ env.CLOUDSQL_CONNECTION_NAME }}"
          if [ -z "$CLOUDSQL_CONNECTION_NAME" ]; then
            CLOUDSQL_CONNECTION_NAME="${{ env.GCP_PROJECT }}:${{ env.GCP_REGION }}:${{ env.CLOUDSQL_INSTANCE_NAME }}"
          fi

          gcloud compute ssh ${{ steps.vm.outputs.name }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              cd ${{ env.APP_DIR }}

              # Pull latest code over HTTPS from the canonical public repo.
              # This avoids brittle dependence on a VM-local SSH deploy key.
              sudo -u catscan git fetch --prune '${{ env.GIT_REMOTE_URL }}' '${{ env.GIT_BRANCH }}'
              sudo -u catscan git checkout -B '${{ env.GIT_BRANCH }}' FETCH_HEAD

              # Set image registry and tag for prebuilt images
              export IMAGE_REGISTRY=${{ env.IMAGE_REGISTRY }}
              export IMAGE_TAG=sha-${SHORT_SHA}
              export CLOUDSQL_INSTANCE='${CLOUDSQL_CONNECTION_NAME}'
              export CATSCAN_ENABLE_GMAIL_IMPORT_SCHEDULER='${{ env.CATSCAN_ENABLE_GMAIL_IMPORT_SCHEDULER }}'
              export CATSCAN_ENABLE_PRECOMPUTE_SCHEDULER='${{ env.CATSCAN_ENABLE_PRECOMPUTE_SCHEDULER }}'
              export CATSCAN_ENABLE_CREATIVE_CACHE_SCHEDULER='${{ env.CATSCAN_ENABLE_CREATIVE_CACHE_SCHEDULER }}'
              export CATSCAN_ENABLE_LANGUAGE_AI='${{ env.CATSCAN_ENABLE_LANGUAGE_AI }}'
              export CATSCAN_ENABLE_CLUSTERING_AI='${{ env.CATSCAN_ENABLE_CLUSTERING_AI }}'
              export CATSCAN_REQUIRE_OAUTH_CLIENT_SECRET_IN_API='${{ env.CATSCAN_REQUIRE_OAUTH_CLIENT_SECRET_IN_API }}'
              export SECRETS_HEALTH_STRICT='${{ env.SECRETS_HEALTH_STRICT }}'

              echo \"Deploying version: \$(cat VERSION) (sha-${SHORT_SHA})\"

              # Refresh Artifact Registry auth via VM instance metadata token.
              # This avoids dependency on root's gcloud auth or credHelper state,
              # which can go stale and cause 'denied: Unauthenticated request' on pull.
              # We write a clean DOCKER_CONFIG to bypass any credHelper that would
              # override docker login credentials.
              AR_TOKEN=\$(curl -sf -H 'Metadata-Flavor: Google' \
                'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
                | jq -r .access_token)
              if [ -z \"\$AR_TOKEN\" ] || [ \"\$AR_TOKEN\" = \"null\" ]; then
                echo 'FAIL: Could not obtain metadata token for Artifact Registry auth'
                exit 1
              fi
              AR_AUTH=\$(echo -n \"oauth2accesstoken:\$AR_TOKEN\" | base64 -w0)
              sudo mkdir -p /tmp/ar-docker-config
              echo \"{\\\"auths\\\":{\\\"https://asia-southeast1-docker.pkg.dev\\\":{\\\"auth\\\":\\\"\$AR_AUTH\\\"}}}\" \
                | sudo tee /tmp/ar-docker-config/config.json >/dev/null
              export DOCKER_CONFIG=/tmp/ar-docker-config
              echo '✓ Artifact Registry auth refreshed via VM metadata token'

              # Pull prebuilt images from Artifact Registry (no building on VM).
              # Capture logs to enforce explicit auth-regression guardrails.
              sudo -E docker compose -f docker-compose.gcp.yml pull >/tmp/catscan_docker_pull.log 2>&1
              PULL_EXIT=\$?
              cat /tmp/catscan_docker_pull.log
              if grep -qi 'Unauthenticated request' /tmp/catscan_docker_pull.log; then
                echo 'FAIL: Artifact Registry auth regression detected (Unauthenticated request)'
                exit 1
              fi
              if [ \$PULL_EXIT -ne 0 ]; then
                echo 'FAIL: docker compose pull failed'
                exit 1
              fi
              echo '✓ Docker image pull from Artifact Registry succeeded'

              # Start containers with new images
              sudo -E docker compose -f docker-compose.gcp.yml up -d --force-recreate

              # Clean up old docker images to prevent disk filling up
              sudo docker image prune -f
              sudo docker container prune -f

              echo 'Deployment complete!'
            "

      - name: Verify deployment
        run: |
          EXPECTED_SHORT_SHA="${GITHUB_SHA::7}"
          MAX_WAIT_SECONDS="${{ github.event.inputs.health_wait_seconds }}"
          if ! [[ "$MAX_WAIT_SECONDS" =~ ^[0-9]+$ ]] || [ "$MAX_WAIT_SECONDS" -lt 10 ]; then
            MAX_WAIT_SECONDS=120
          fi
          POLL_SECONDS=5
          ATTEMPTS=$(( (MAX_WAIT_SECONDS + POLL_SECONDS - 1) / POLL_SECONDS ))

          # Health check with early-exit polling.
          gcloud compute ssh ${{ steps.vm.outputs.name }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              MAX_ATTEMPTS=${ATTEMPTS}
              POLL_SECONDS=${POLL_SECONDS}
              success=0
              for i in \$(seq 1 \${MAX_ATTEMPTS}); do
                if curl -sf http://localhost:8000/health >/tmp/catscan_health.json; then
                  echo \"API healthy after attempt \${i}/\${MAX_ATTEMPTS}\"
                  cat /tmp/catscan_health.json
                  success=1
                  break
                fi
                echo \"Waiting for API health... attempt \${i}/\${MAX_ATTEMPTS}\"
                sleep \${POLL_SECONDS}
              done

              if [ \${success} -ne 1 ]; then
                echo \"FAIL: API not responding within ${MAX_WAIT_SECONDS}s\"
                sudo docker ps
                exit 1
              fi

              # Hard-fail on deployed version/sha mismatch.
              if ! python3 -c 'import json,sys; payload=json.load(open(\"/tmp/catscan_health.json\")); expected=sys.argv[1].lower(); version=str(payload.get(\"version\") or \"\"); git_sha=str(payload.get(\"git_sha\") or \"\").lower(); print(\"health_version={}\".format(version)); print(\"health_git_sha={}\".format(payload.get(\"git_sha\"))); ok=(version == f\"sha-{expected}\") or git_sha.startswith(expected); sys.exit(0 if ok else 1)' \"${EXPECTED_SHORT_SHA}\"; then
                echo \"FAIL: health version/git_sha does not match expected sha-${EXPECTED_SHORT_SHA}\"
                cat /tmp/catscan_health.json
                sudo docker ps
                exit 1
              fi

              # Secrets-health verification via deterministic in-container probe.
              # Bypasses HTTP auth entirely — runs the check inside the container.
              set +e
              sudo bash ${{ env.APP_DIR }}/scripts/verify_secrets_health.sh \
                --container catscan-api \
                --json-out /tmp/catscan_secrets_health.json \
                \$([ '${SECRETS_HEALTH_STRICT}' = 'true' ] && echo '--strict')
              SECRETS_EXIT=\$?
              set -e

              if [ \${SECRETS_EXIT} -eq 0 ]; then
                echo '✓ Secrets health verified'
              elif [ '${SECRETS_HEALTH_STRICT}' = 'true' ]; then
                echo \"FAIL: secrets-health verify exited \${SECRETS_EXIT} (strict mode)\"
                exit 1
              else
                echo \"WARN: secrets-health verify exited \${SECRETS_EXIT} (advisory, SECRETS_HEALTH_STRICT=false)\"
              fi

              sudo docker ps
            "

      - name: Emit promotion summary
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.target }}" = "staging" ]; then
            echo "Staging deploy complete on ${{ env.STAGING_API_BASE_URL }}."
            echo "Next step: verify the change on vm2, then run this workflow again with target=production."
          else
            echo "Production promotion complete on ${{ env.PRODUCTION_API_BASE_URL }}."
          fi

      - name: Post-deploy contract check
        if: ${{ github.event.inputs.run_contract_check != 'false' }}
        id: contracts
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          ARTIFACT_NAME="contracts_${SHORT_SHA}_${{ steps.vm.outputs.name }}_${TIMESTAMP}.json"
          ARTIFACT_PATH="/tmp/${ARTIFACT_NAME}"
          echo "ARTIFACT_PATH=${ARTIFACT_PATH}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

          echo "::group::Contract check (${ARTIFACT_NAME})"

          set +e
          gcloud compute ssh ${{ steps.vm.outputs.name }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              sudo docker exec catscan-api python /app/scripts/contracts_check.py \
                --days 7 \
                --db-dsn-env POSTGRES_DSN \
                --json-out /tmp/contracts_post_deploy.json
            "
          CHECK_EXIT=$?
          set -e

          # Copy JSON artifact from VM
          set +e
          gcloud compute scp ${{ steps.vm.outputs.name }}:/tmp/contracts_post_deploy.json \
            "${ARTIFACT_PATH}" \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" 2>/dev/null
          SCP_EXIT=$?
          set -e

          if [ "$SCP_EXIT" -ne 0 ] || [ ! -f "${ARTIFACT_PATH}" ]; then
            echo "::warning::SCP copy failed (exit ${SCP_EXIT}). Writing fallback artifact."
            cat > "${ARTIFACT_PATH}" <<FALLBACK
          {
            "timestamp": "${TIMESTAMP}",
            "vm": "${{ steps.vm.outputs.name }}",
            "sha": "${SHORT_SHA}",
            "check_exit": ${CHECK_EXIT},
            "error": "artifact_copy_failed",
            "note": "Contract JSON could not be copied from VM. Gate status decided by check_exit and ALLOW_CONTRACT_FAILURE flag."
          }
          FALLBACK
          fi

          echo "::endgroup::"
          echo "Contract JSON artifact: ${ARTIFACT_PATH}"

          if [ "$CHECK_EXIT" -ne 0 ]; then
            if [ "${{ env.ALLOW_CONTRACT_FAILURE }}" = "true" ]; then
              echo "::warning::CONTRACT CHECK FAILED (exit ${CHECK_EXIT}) — BYPASSED via ALLOW_CONTRACT_FAILURE=true"
              echo "::warning::This bypass must be temporary. Remove ALLOW_CONTRACT_FAILURE after investigation."
            else
              echo "::error::CONTRACT CHECK FAILED (exit ${CHECK_EXIT}). Deploy blocked."
              echo "::error::Set repository variable ALLOW_CONTRACT_FAILURE=true to bypass (temporary only)."
              exit 1
            fi
          fi

      - name: Upload contract check artifact
        if: ${{ always() && github.event.inputs.run_contract_check != 'false' && env.ARTIFACT_PATH != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: contracts-${{ steps.vm.outputs.name }}-${{ github.sha }}
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 90
          if-no-files-found: warn
