name: Deploy to GCP

on:
  push:
    branches:
      - unified-platform
  workflow_dispatch:  # Allow manual trigger

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  GCP_PROJECT: catscan-prod-202601
  GCP_ZONE: europe-west1-b
  VM_NAME: catscan-production
  APP_DIR: /opt/catscan

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Deploy to VM via IAP tunnel
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              cd ${{ env.APP_DIR }}

              # Pull latest code
              sudo -u catscan git fetch origin
              sudo -u catscan git checkout unified-platform
              sudo -u catscan git reset --hard origin/unified-platform

              # Get version
              export APP_VERSION=\$(cat VERSION)
              echo \"Deploying version: \$APP_VERSION\"

              # Rebuild and restart services with correct compose file
              sudo docker-compose -f docker-compose.gcp.yml down
              sudo docker-compose -f docker-compose.gcp.yml up -d --build

              echo 'Deployment complete!'
            "

      - name: Verify deployment
        run: |
          # Wait for services to start
          sleep 30

          # Health check
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              curl -s http://localhost:8000/health || echo 'API not responding yet'
              sudo docker ps
            "
