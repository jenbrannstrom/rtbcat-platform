name: v1 AppsFlyer Pilot Check

on:
  workflow_dispatch:
    inputs:
      buyer_id:
        description: "Buyer ID to check"
        required: true
        default: ""
      api_base_url:
        description: "API base URL (include /api path)"
        required: true
        default: ""
      timeout_seconds:
        description: "Per-request timeout for API calls (seconds)"
        required: false
        default: "90"
  schedule:
    - cron: "30 3 * * *"

concurrency:
  group: v1-appsflyer-pilot-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pilot-check:
    name: Run AppsFlyer pilot readiness check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CATSCAN_API_TOKEN: ${{ secrets.CATSCAN_CANARY_BEARER_TOKEN }}
      CATSCAN_CANARY_EMAIL: ${{ secrets.CATSCAN_CANARY_EMAIL }}
      CATSCAN_APPSFLYER_BUYER_ID_DEFAULT: ${{ vars.CATSCAN_APPSFLYER_PILOT_BUYER_ID }}
      CATSCAN_APPSFLYER_API_BASE_URL_DEFAULT: ${{ vars.CATSCAN_APPSFLYER_API_BASE_URL || vars.CATSCAN_RUNTIME_HEALTH_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve pilot configuration
        id: config
        run: |
          set -euo pipefail

          buyer_id="${{ github.event.inputs.buyer_id || '' }}"
          api_base_url="${{ github.event.inputs.api_base_url || '' }}"
          timeout_seconds="${{ github.event.inputs.timeout_seconds || '90' }}"

          if [[ -z "${buyer_id}" ]]; then
            buyer_id="${CATSCAN_APPSFLYER_BUYER_ID_DEFAULT:-}"
          fi
          if [[ -z "${api_base_url}" ]]; then
            api_base_url="${CATSCAN_APPSFLYER_API_BASE_URL_DEFAULT:-}"
          fi

          missing=()
          if [[ -z "${buyer_id}" ]]; then
            missing+=("CATSCAN_APPSFLYER_PILOT_BUYER_ID")
          fi
          if [[ -z "${api_base_url}" || "${api_base_url}" == "https://your-deployment.example.com/api" ]]; then
            missing+=("CATSCAN_APPSFLYER_API_BASE_URL")
          fi
          if [[ -z "${CATSCAN_API_TOKEN:-}" && -z "${CATSCAN_CANARY_EMAIL:-}" ]]; then
            missing+=("CATSCAN_CANARY_BEARER_TOKEN or CATSCAN_CANARY_EMAIL")
          fi

          if [[ "${#missing[@]}" -gt 0 ]]; then
            skip_reason="Missing required AppsFlyer pilot check configuration: $(IFS=', '; echo "${missing[*]}")"
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=${skip_reason}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "${skip_reason}" >&2
            exit 1
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "CATSCAN_BUYER_ID=${buyer_id}" >> "$GITHUB_ENV"
          echo "CATSCAN_API_BASE_URL=${api_base_url}" >> "$GITHUB_ENV"
          echo "CATSCAN_CANARY_TIMEOUT_SECONDS=${timeout_seconds}" >> "$GITHUB_ENV"

      - name: Run AppsFlyer pilot checker
        id: pilot
        if: steps.config.outputs.should_run == 'true'
        run: |
          timeout_val="${CATSCAN_CANARY_TIMEOUT_SECONDS}"

          set +e
          bash scripts/run_appsflyer_pilot_check.sh \
            --buyer-id "${CATSCAN_BUYER_ID}" \
            --timeout "${timeout_val}" \
            | tee /tmp/v1_appsflyer_pilot.log
          pilot_status=${PIPESTATUS[0]}
          set -e

          report_path="$(grep -E '^report_md=' /tmp/v1_appsflyer_pilot.log | tail -n1 | cut -d= -f2-)"
          if [[ -z "${report_path}" ]]; then
            latest_dir="$(ls -1dt /tmp/appsflyer-pilot-check-* 2>/dev/null | head -n1 || true)"
            if [[ -n "${latest_dir}" && -f "${latest_dir}/pilot_check_report.md" ]]; then
              report_path="${latest_dir}/pilot_check_report.md"
            fi
          fi

          if [[ -n "${report_path}" ]]; then
            echo "report_path=${report_path}" >> "$GITHUB_OUTPUT"
            echo "run_dir=$(dirname "${report_path}")" >> "$GITHUB_OUTPUT"
          else
            echo "report_path=" >> "$GITHUB_OUTPUT"
            echo "run_dir=" >> "$GITHUB_OUTPUT"
          fi

          exit "${pilot_status}"

      - name: Publish pilot summary
        if: always()
        run: |
          if [[ "${{ steps.config.outputs.should_run }}" != "true" ]]; then
            {
              echo "## AppsFlyer Pilot Check"
              echo ""
              echo "- Status: skipped"
              echo "- Reason: ${{ steps.config.outputs.skip_reason }}"
            } >> "$GITHUB_STEP_SUMMARY"
          elif [[ -n "${{ steps.pilot.outputs.report_path }}" && -f "${{ steps.pilot.outputs.report_path }}" ]]; then
            report_path="${{ steps.pilot.outputs.report_path }}"
            cat "${report_path}" >> "$GITHUB_STEP_SUMMARY"
          elif [[ -f /tmp/v1_appsflyer_pilot.log ]]; then
            echo "Pilot markdown report missing; log tail:" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 80 /tmp/v1_appsflyer_pilot.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Pilot report/log missing." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload pilot artifact
        if: always() && steps.config.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: v1-appsflyer-pilot-check-report
          path: |
            /tmp/v1_appsflyer_pilot.log
            ${{ steps.pilot.outputs.run_dir }}
          if-no-files-found: warn
