name: Cloud SQL Logical Backup

on:
  workflow_dispatch:
    inputs:
      instance:
        description: "Cloud SQL instance name"
        required: false
        default: ""
      database:
        description: "Database name to export"
        required: false
        default: ""
      bucket:
        description: "GCS bucket for SQL dumps (without gs://)"
        required: false
        default: ""
  schedule:
    - cron: "20 9 * * *"

concurrency:
  group: cloudsql-logical-backup-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  CLOUDSQL_INSTANCE_DEFAULT: ${{ vars.CLOUDSQL_INSTANCE }}
  CLOUDSQL_DATABASE_DEFAULT: ${{ vars.CLOUDSQL_DATABASE }}
  CLOUDSQL_BACKUP_BUCKET_DEFAULT: ${{ vars.CLOUDSQL_BACKUP_BUCKET }}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve backup configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          INSTANCE="${{ github.event.inputs.instance || '' }}"
          DATABASE="${{ github.event.inputs.database || '' }}"
          BUCKET="${{ github.event.inputs.bucket || '' }}"

          if [ -z "$INSTANCE" ]; then
            INSTANCE="${CLOUDSQL_INSTANCE_DEFAULT:-}"
          fi
          if [ -z "$DATABASE" ]; then
            DATABASE="${CLOUDSQL_DATABASE_DEFAULT:-}"
          fi
          if [ -z "$BUCKET" ]; then
            BUCKET="${CLOUDSQL_BACKUP_BUCKET_DEFAULT:-}"
          fi

          missing=()
          for pair in \
            "GCP_PROJECT:${GCP_PROJECT:-}" \
            "CLOUDSQL_INSTANCE:${INSTANCE}" \
            "CLOUDSQL_DATABASE:${DATABASE}" \
            "CLOUDSQL_BACKUP_BUCKET:${BUCKET}"; do
            name="${pair%%:*}"
            value="${pair#*:}"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            skip_reason="Missing required backup configuration: $(IFS=', '; echo "${missing[*]}")"
            if [ "${{ github.event_name }}" = "schedule" ]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=${skip_reason}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "${skip_reason}" >&2
            exit 1
          fi

          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          URI="gs://${BUCKET}/${INSTANCE}/${DATABASE}-${TS}.sql.gz"

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "INSTANCE=$INSTANCE" >> "$GITHUB_ENV"
          echo "DATABASE=$DATABASE" >> "$GITHUB_ENV"
          echo "BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "EXPORT_URI=$URI" >> "$GITHUB_ENV"
          echo "EXPORT_TS=$TS" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        if: steps.config.outputs.should_run == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: steps.config.outputs.should_run == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Export SQL dump to GCS
        if: steps.config.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Exporting ${DATABASE} from ${INSTANCE} to ${EXPORT_URI}"
          gcloud sql export sql "${INSTANCE}" "${EXPORT_URI}" \
            --project "${GCP_PROJECT}" \
            --database "${DATABASE}" \
            --offload \
            --quiet

      - name: Verify backup object
        if: steps.config.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          gcloud storage ls "${EXPORT_URI}"
          SIZE_BYTES="$(gcloud storage objects describe "${EXPORT_URI}" --format='value(size)')"
          if ! [[ "${SIZE_BYTES}" =~ ^[0-9]+$ ]] || [ "${SIZE_BYTES}" -le 0 ]; then
            echo "Backup object size is invalid: ${SIZE_BYTES}"
            exit 1
          fi
          echo "Backup size (bytes): ${SIZE_BYTES}"
          echo "SIZE_BYTES=${SIZE_BYTES}" >> "$GITHUB_ENV"

      - name: Write skipped summary
        if: steps.config.outputs.should_run != 'true'
        shell: bash
        run: |
          {
            echo "## Cloud SQL Logical Backup"
            echo ""
            echo "- Status: skipped"
            echo "- Reason: ${{ steps.config.outputs.skip_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write summary
        if: steps.config.outputs.should_run == 'true'
        shell: bash
        run: |
          {
            echo "## Cloud SQL Logical Backup"
            echo ""
            echo "- Project: \`${GCP_PROJECT}\`"
            echo "- Instance: \`${INSTANCE}\`"
            echo "- Database: \`${DATABASE}\`"
            echo "- Export URI: \`${EXPORT_URI}\`"
            echo "- Size (bytes): \`${SIZE_BYTES}\`"
            echo "- Timestamp (UTC): \`${EXPORT_TS}\`"
          } >> "$GITHUB_STEP_SUMMARY"
