name: CI Schema Compatibility

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
  push:
    branches:
      - unified-platform
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "ROADMAP.md"
  workflow_dispatch:

concurrency:
  group: ci-schema-compat-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-migration-compat:
    name: Postgres Migration Compatibility
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: catscan
          POSTGRES_PASSWORD: catscan
          POSTGRES_DB: catscan_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U catscan -d catscan_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      POSTGRES_DSN: postgresql://catscan:catscan@127.0.0.1:5432/catscan_ci
      POSTGRES_SERVING_DSN: postgresql://catscan:catscan@127.0.0.1:5432/catscan_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install migration test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "psycopg[binary]" pytest pydantic

      - name: Apply migrations (clean DB)
        run: python scripts/postgres_migrate.py

      - name: Re-run migrations (idempotency)
        run: python scripts/postgres_migrate.py

      - name: Check migration status
        run: python scripts/postgres_migrate.py --status

      - name: Verify no pending migrations
        run: |
          set -euo pipefail
          python scripts/postgres_migrate.py --dry-run 2>&1 | tee /tmp/postgres_migrate_dry_run.log
          grep -q "No pending migrations." /tmp/postgres_migrate_dry_run.log

      - name: Audit migration version markers
        run: python scripts/postgres_migrate.py --audit-versions

      - name: Verify critical tables exist
        run: |
          python - <<'PY'
          import os
          import psycopg

          expected_tables = [
              "schema_migrations",
              "buyer_seats",
              "creatives",
              "pretargeting_configs",
              "rtb_daily",
              "home_publisher_daily",
              "config_size_daily",
              "config_geo_daily",
              "config_publisher_daily",
              "config_creative_daily",
              "rtb_endpoints_current",
              "campaign_daily_summary",
          ]

          dsn = os.environ["POSTGRES_DSN"]
          missing = []

          with psycopg.connect(dsn) as conn:
              with conn.cursor() as cur:
                  for table in expected_tables:
                      cur.execute("SELECT to_regclass(%s)", (f"public.{table}",))
                      if cur.fetchone()[0] is None:
                          missing.append(table)

          if missing:
              raise SystemExit(f"Missing critical tables after migrations: {', '.join(missing)}")

          print("All critical tables exist.")
          PY

      - name: Run migration DDL regression tests
        run: pytest tests/test_response_model_regressions.py -v --tb=short
