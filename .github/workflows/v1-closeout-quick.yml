name: v1 Closeout Quick

on:
  pull_request:
    paths:
      - "api/**"
      - "services/**"
      - "tests/**"
      - "scripts/run_v1_closeout_local.sh"
      - "scripts/v1_canary_smoke.py"
      - "Makefile"
      - ".github/workflows/v1-closeout-quick.yml"
  push:
    branches:
      - unified-platform
    paths:
      - "api/**"
      - "services/**"
      - "tests/**"
      - "scripts/run_v1_closeout_local.sh"
      - "scripts/v1_canary_smoke.py"
      - "Makefile"
      - ".github/workflows/v1-closeout-quick.yml"

concurrency:
  group: v1-closeout-quick-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  closeout-quick:
    name: Run v1 closeout quick profile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run quick closeout
        run: CATSCAN_CLOSEOUT_PROFILE=quick make v1-closeout-local

      - name: Upload closeout report
        uses: actions/upload-artifact@v4
        with:
          name: v1-closeout-quick-report
          path: /tmp/v1_closeout_last_run.md
          if-no-files-found: error
