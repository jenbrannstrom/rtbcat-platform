name: Manual Build Hetzner Images to GHCR

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type PUBLISH_HETZNER to publish this exact commit."
        required: true
        default: ""

concurrency:
  group: manual-hetzner-ghcr-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  test:
    if: ${{ github.event.inputs.confirm == 'PUBLISH_HETZNER' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact workflow commit
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run deployment-critical tests
        run: |
          pytest \
            tests/test_contracts_check.py \
            tests/test_catscan_finance_db_reconcile.py \
            tests/test_catscan_mcp_db_smoke.py \
            tests/test_deployment_serving_dsn.py \
            tests/test_precompute_completeness.py \
            tests/test_ingestion_observability.py \
            tests/test_endpoint_feed.py \
            tests/test_migration_read_compatibility.py \
            tests/test_qps_router_async.py \
            tests/test_read_only_shadow.py \
            -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact workflow commit
        uses: actions/checkout@v6

      - name: Set immutable image metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          release_version="$(tr -d '[:space:]' < VERSION)"
          if ! [[ "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must contain SemVer X.Y.Z." >&2
            exit 1
          fi
          echo "api_image=ghcr.io/${owner}/catscan-api" >> "$GITHUB_OUTPUT"
          echo "dashboard_image=ghcr.io/${owner}/catscan-dashboard" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR with the workflow token
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish API
        id: api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.api_image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.release_version }}
          build-args: |
            APP_VERSION=sha-${{ github.sha }}
            GIT_SHA=${{ github.sha }}
            RELEASE_VERSION=${{ steps.metadata.outputs.release_version }}
            INSTALL_AI_EXTRAS=true
            RUNTIME_UID=10001
            RUNTIME_GID=10001
          cache-from: type=gha,scope=hetzner-catscan-api
          cache-to: type=gha,mode=max,scope=hetzner-catscan-api
          provenance: mode=max
          sbom: true

      - name: Build and publish dashboard
        id: dashboard
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.dashboard_image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.release_version }}
          build-args: |
            APP_VERSION=sha-${{ github.sha }}
            GIT_SHA=${{ github.sha }}
            RELEASE_VERSION=${{ steps.metadata.outputs.release_version }}
            OAUTH2_PROXY_MODE=false
            API_HOST=api
          cache-from: type=gha,scope=hetzner-catscan-dashboard
          cache-to: type=gha,mode=max,scope=hetzner-catscan-dashboard
          provenance: mode=max
          sbom: true

      - name: Write digest-pinned Hetzner release manifest
        shell: bash
        env:
          API_IMAGE: ${{ steps.metadata.outputs.api_image }}
          API_DIGEST: ${{ steps.api.outputs.digest }}
          DASHBOARD_IMAGE: ${{ steps.metadata.outputs.dashboard_image }}
          DASHBOARD_DIGEST: ${{ steps.dashboard.outputs.digest }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.release_version }}
        run: |
          set -euo pipefail
          for digest in "$API_DIGEST" "$DASHBOARD_DIGEST"; do
            if ! [[ "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]; then
              echo "Build did not return an immutable sha256 digest." >&2
              exit 1
            fi
          done
          {
            printf 'RELEASE_GIT_SHA=%s\n' "$GITHUB_SHA"
            printf 'RELEASE_VERSION=%s\n' "$RELEASE_VERSION"
            printf 'DEPLOY_COMPOSE_SHA256=%s\n' "$(sha256sum deploy/hetzner/compose.yml | awk '{print $1}')"
            printf 'API_IMAGE=%s@%s\n' "$API_IMAGE" "$API_DIGEST"
            printf 'DASHBOARD_IMAGE=%s@%s\n' "$DASHBOARD_IMAGE" "$DASHBOARD_DIGEST"
          } > hetzner-release.env
          cp deploy/hetzner/compose.yml hetzner-compose.yml

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: hetzner-release-${{ github.sha }}
          path: |
            hetzner-release.env
            hetzner-compose.yml
          if-no-files-found: error
          retention-days: 30
