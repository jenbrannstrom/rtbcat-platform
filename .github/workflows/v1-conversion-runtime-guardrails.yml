name: v1 Conversion Runtime Guardrails

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API base URL (include /api path)"
        required: true
        default: ""
      strict_security:
        description: "Fail run if webhook security posture is not fully hardened"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      run_retention:
        description: "Run retention cleanup during check"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      timeout_seconds:
        description: "Per-request timeout for API calls (seconds)"
        required: false
        default: "60"
  schedule:
    - cron: "20 2 * * *"

concurrency:
  group: v1-conversion-runtime-guardrails-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  conversion-runtime-guardrails:
    name: Run conversion runtime guardrail checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CATSCAN_API_TOKEN: ${{ secrets.CATSCAN_CANARY_BEARER_TOKEN }}
      CATSCAN_CANARY_EMAIL: ${{ secrets.CATSCAN_CANARY_EMAIL }}
      CATSCAN_CONVERSION_GUARDRAILS_API_BASE_URL_DEFAULT: ${{ vars.CATSCAN_CONVERSION_GUARDRAILS_API_BASE_URL || vars.CATSCAN_RUNTIME_HEALTH_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve guardrail configuration
        id: config
        run: |
          set -euo pipefail

          api_base_url="${{ github.event.inputs.api_base_url || '' }}"
          strict_security="${{ github.event.inputs.strict_security || 'true' }}"
          run_retention="${{ github.event.inputs.run_retention || 'true' }}"
          timeout_seconds="${{ github.event.inputs.timeout_seconds || '60' }}"

          if [[ -z "${api_base_url}" ]]; then
            api_base_url="${CATSCAN_CONVERSION_GUARDRAILS_API_BASE_URL_DEFAULT:-}"
          fi

          missing=()
          if [[ -z "${api_base_url}" || "${api_base_url}" == "https://your-deployment.example.com/api" ]]; then
            missing+=("CATSCAN_CONVERSION_GUARDRAILS_API_BASE_URL")
          fi
          if [[ -z "${CATSCAN_API_TOKEN:-}" && -z "${CATSCAN_CANARY_EMAIL:-}" ]]; then
            missing+=("CATSCAN_CANARY_BEARER_TOKEN or CATSCAN_CANARY_EMAIL")
          fi

          if [[ "${#missing[@]}" -gt 0 ]]; then
            skip_reason="Missing required conversion guardrail configuration: $(IFS=', '; echo "${missing[*]}")"
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=${skip_reason}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "${skip_reason}" >&2
            exit 1
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "CATSCAN_API_BASE_URL=${api_base_url}" >> "$GITHUB_ENV"
          echo "CATSCAN_GUARDRAIL_STRICT_SECURITY=${strict_security}" >> "$GITHUB_ENV"
          echo "CATSCAN_GUARDRAIL_RUN_RETENTION=${run_retention}" >> "$GITHUB_ENV"
          echo "CATSCAN_CANARY_TIMEOUT_SECONDS=${timeout_seconds}" >> "$GITHUB_ENV"

      - name: Run conversion runtime guardrail checks
        id: guardrail
        if: steps.config.outputs.should_run == 'true'
        run: |
          args=(
            --base-url "${CATSCAN_API_BASE_URL}"
            --timeout "${CATSCAN_CANARY_TIMEOUT_SECONDS}"
          )
          if [[ -n "${CATSCAN_API_TOKEN:-}" ]]; then
            args+=(--token "${CATSCAN_API_TOKEN}")
          elif [[ -n "${CATSCAN_CANARY_EMAIL:-}" ]]; then
            args+=(--email "${CATSCAN_CANARY_EMAIL}")
          fi
          if [[ "${CATSCAN_GUARDRAIL_STRICT_SECURITY}" == "true" ]]; then
            args+=(--strict-security)
          fi
          if [[ "${CATSCAN_GUARDRAIL_RUN_RETENTION}" != "true" ]]; then
            args+=(--skip-retention-run)
          fi

          set +e
          bash scripts/check_conversion_runtime_guardrails.sh "${args[@]}" | tee /tmp/v1_conversion_runtime_guardrails.log
          guardrail_status=${PIPESTATUS[0]}
          set -e

          report_path="$(grep -E '^report_md=' /tmp/v1_conversion_runtime_guardrails.log | tail -n1 | cut -d= -f2-)"
          if [[ -z "${report_path}" ]]; then
            latest_dir="$(ls -1dt /tmp/conversion-runtime-guardrails-* 2>/dev/null | head -n1 || true)"
            if [[ -n "${latest_dir}" && -f "${latest_dir}/guardrail_report.md" ]]; then
              report_path="${latest_dir}/guardrail_report.md"
            fi
          fi

          if [[ -n "${report_path}" ]]; then
            echo "report_path=${report_path}" >> "$GITHUB_OUTPUT"
            echo "run_dir=$(dirname "${report_path}")" >> "$GITHUB_OUTPUT"
          else
            echo "report_path=" >> "$GITHUB_OUTPUT"
            echo "run_dir=" >> "$GITHUB_OUTPUT"
          fi

          exit "${guardrail_status}"

      - name: Publish guardrail summary
        if: always()
        run: |
          if [[ "${{ steps.config.outputs.should_run }}" != "true" ]]; then
            {
              echo "## Conversion Runtime Guardrails"
              echo ""
              echo "- Status: skipped"
              echo "- Reason: ${{ steps.config.outputs.skip_reason }}"
            } >> "$GITHUB_STEP_SUMMARY"
          elif [[ -n "${{ steps.guardrail.outputs.report_path }}" && -f "${{ steps.guardrail.outputs.report_path }}" ]]; then
            report_path="${{ steps.guardrail.outputs.report_path }}"
            cat "${report_path}" >> "$GITHUB_STEP_SUMMARY"
          elif [[ -f /tmp/v1_conversion_runtime_guardrails.log ]]; then
            echo "Guardrail markdown report missing; log tail:" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 80 /tmp/v1_conversion_runtime_guardrails.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Guardrail report/log missing." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload guardrail artifact
        if: always() && steps.config.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: v1-conversion-runtime-guardrails-report
          path: |
            /tmp/v1_conversion_runtime_guardrails.log
            ${{ steps.guardrail.outputs.run_dir }}
          if-no-files-found: warn
