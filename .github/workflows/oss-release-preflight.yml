name: OSS Release Preflight

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master, main]

concurrency:
  group: oss-preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  forbidden-files:
    name: Forbidden Tracked Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for forbidden tracked files
        run: |
          PATTERNS='\.env$|\.env\.local$|\.env\.production$|terraform\.tfvars$|\.tfstate|catscan-ci-key\.json$|service.account.*\.json$|credentials\.json$|\.pem$|\.p12$|id_rsa$|id_ed25519$|\.sqlite3?$'
          FOUND=$(git ls-files | grep -iE "$PATTERNS" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Forbidden files tracked in git:"
            echo "$FOUND"
            exit 1
          fi
          echo "No forbidden files found."

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pip-audit
        run: |
          pip install pip-audit
          for req in requirements.txt requirements-ai.txt requirements-dev.txt; do
            pip-audit -r "$req"
          done

  npm-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Run npm audit
        run: |
          cd dashboard
          npm ci
          npm audit --audit-level=high

  root-files:
    name: Required Root Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify SECURITY.md and LICENSE exist
        run: |
          for f in SECURITY.md LICENSE; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "All required root files present."

      - name: Verify Python metadata matches VERSION
        run: |
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          PYPROJECT_VERSION="$(python3 -c 'from pathlib import Path; import tomllib; print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])')"
          test "$VERSION_VALUE" = "$PYPROJECT_VERSION"
