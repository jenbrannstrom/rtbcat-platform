name: CI Build and Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'ROADMAP.md'
      - 'CLAUDE.md'
  workflow_dispatch:

concurrency:
  group: ci-build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT }}
  REGION: ${{ vars.GCP_REGION }}
  REPOSITORY: ${{ vars.GCP_REPOSITORY }}
  REGISTRY_HOST: ${{ vars.GCP_REGISTRY_HOST }}

jobs:
  test:
    name: Contract and Recovery Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run contract and recovery tests
        run: |
          pytest tests/test_contracts_check.py \
                 tests/test_precompute_completeness.py \
                 tests/test_ingestion_observability.py \
                 tests/test_endpoint_feed.py \
                 -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  build-and-push:
    name: Build and Push ${{ matrix.image_name }} image
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: catscan-api
            dockerfile: Dockerfile
            context: .
          - image_name: catscan-dashboard
            dockerfile: dashboard/Dockerfile
            context: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate registry configuration
        shell: bash
        run: |
          set -euo pipefail
          for var_name in PROJECT_ID REGION REPOSITORY REGISTRY_HOST; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required repository variable: ${var_name}"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker $REGISTRY_HOST --quiet

      - name: Set image metadata
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: VERSION must be SemVer (X.Y.Z), got: $RELEASE_VERSION"
            exit 1
          fi

          SEMVER_TAG=""
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            SEMVER_TAG="${GITHUB_REF_NAME}"
            if [[ "$SEMVER_TAG" != "v${RELEASE_VERSION}" ]]; then
              echo "ERROR: tag ($SEMVER_TAG) must match VERSION (v${RELEASE_VERSION})"
              exit 1
            fi
          fi

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_registry=${REGISTRY_HOST}/${PROJECT_ID}/${REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "semver_tag=${SEMVER_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        if: ${{ matrix.image_name == 'catscan-api' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.vars.outputs.image_registry }}/${{ matrix.image_name }}:sha-${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.image_registry }}/${{ matrix.image_name }}:latest
            ${{ steps.vars.outputs.semver_tag != '' && format('{0}/{1}:{2}', steps.vars.outputs.image_registry, matrix.image_name, steps.vars.outputs.semver_tag) || '' }}
          build-args: |
            APP_VERSION=sha-${{ steps.vars.outputs.short_sha }}
            GIT_SHA=${{ steps.vars.outputs.short_sha }}
            RELEASE_VERSION=${{ steps.vars.outputs.release_version }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      - name: Build and push Dashboard image
        if: ${{ matrix.image_name == 'catscan-dashboard' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.vars.outputs.image_registry }}/${{ matrix.image_name }}:sha-${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.image_registry }}/${{ matrix.image_name }}:latest
            ${{ steps.vars.outputs.semver_tag != '' && format('{0}/{1}:{2}', steps.vars.outputs.image_registry, matrix.image_name, steps.vars.outputs.semver_tag) || '' }}
          build-args: |
            APP_VERSION=sha-${{ steps.vars.outputs.short_sha }}
            GIT_SHA=${{ steps.vars.outputs.short_sha }}
            RELEASE_VERSION=${{ steps.vars.outputs.release_version }}
            OAUTH2_PROXY_MODE=true
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
