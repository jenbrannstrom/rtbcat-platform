name: CI Build and Push Images

on:
  push:
    branches:
      - unified-platform
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'ROADMAP.md'
      - 'CLAUDE.md'
  workflow_dispatch:

concurrency:
  group: ci-build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT || 'catscan-prod-202601' }}
  REGION: ${{ vars.GCP_REGION || 'asia-southeast1' }}
  REPOSITORY: ${{ vars.GCP_REPOSITORY || 'catscan' }}
  REGISTRY_HOST: ${{ vars.GCP_REGISTRY_HOST || 'asia-southeast1-docker.pkg.dev' }}

jobs:
  test:
    name: Contract and Recovery Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install psycopg[binary] pytest pytest-asyncio boto3

      - name: Run contract and recovery tests
        run: |
          pytest tests/test_contracts_check.py \
                 tests/test_precompute_completeness.py \
                 tests/test_ingestion_observability.py \
                 tests/test_endpoint_feed.py \
                 -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  build-and-push:
    name: Build and Push API + Dashboard Images
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker $REGISTRY_HOST --quiet

      - name: Set image tags
        run: |
          echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "IMAGE_REGISTRY=${REGISTRY_HOST}/${PROJECT_ID}/${REPOSITORY}" >> "$GITHUB_ENV"

      - name: Build and push API image
        run: |
          docker build \
            -t "$IMAGE_REGISTRY/catscan-api:$IMAGE_TAG" \
            -t "$IMAGE_REGISTRY/catscan-api:latest" \
            --build-arg APP_VERSION="sha-${GITHUB_SHA::7}" \
            --build-arg GIT_SHA="${GITHUB_SHA::7}" \
            -f Dockerfile .
          docker push "$IMAGE_REGISTRY/catscan-api:$IMAGE_TAG"
          docker push "$IMAGE_REGISTRY/catscan-api:latest"

      - name: Build and push dashboard image
        run: |
          docker build \
            -t "$IMAGE_REGISTRY/catscan-dashboard:$IMAGE_TAG" \
            -t "$IMAGE_REGISTRY/catscan-dashboard:latest" \
            --build-arg APP_VERSION="sha-${GITHUB_SHA::7}" \
            --build-arg GIT_SHA="${GITHUB_SHA::7}" \
            --build-arg OAUTH2_PROXY_MODE=true \
            -f dashboard/Dockerfile dashboard
          docker push "$IMAGE_REGISTRY/catscan-dashboard:$IMAGE_TAG"
          docker push "$IMAGE_REGISTRY/catscan-dashboard:latest"
