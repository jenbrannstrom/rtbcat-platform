name: CI Build and Push Images

on:
  push:
    branches:
      - unified-platform
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'ROADMAP.md'
      - 'CLAUDE.md'
  workflow_dispatch:

concurrency:
  group: ci-build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT || 'catscan-prod-202601' }}
  REGION: ${{ vars.GCP_REGION || 'asia-southeast1' }}
  REPOSITORY: ${{ vars.GCP_REPOSITORY || 'catscan' }}
  REGISTRY_HOST: ${{ vars.GCP_REGISTRY_HOST || 'asia-southeast1-docker.pkg.dev' }}

jobs:
  test:
    name: Contract and Recovery Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install psycopg[binary] pytest pytest-asyncio boto3

      - name: Run contract and recovery tests
        run: |
          pytest tests/test_contracts_check.py \
                 tests/test_precompute_completeness.py \
                 tests/test_ingestion_observability.py \
                 tests/test_endpoint_feed.py \
                 -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  build-and-push:
    name: Build and Push ${{ matrix.image_name }} image
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: catscan-api
            dockerfile: Dockerfile
            context: .
          - image_name: catscan-dashboard
            dockerfile: dashboard/Dockerfile
            context: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker $REGISTRY_HOST --quiet

      - name: Set image metadata
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image_registry=${REGISTRY_HOST}/${PROJECT_ID}/${REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        if: ${{ matrix.image_name == 'catscan-api' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.vars.outputs.image_registry }}/${{ matrix.image_name }}:sha-${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.image_registry }}/${{ matrix.image_name }}:latest
          build-args: |
            APP_VERSION=sha-${{ steps.vars.outputs.short_sha }}
            GIT_SHA=${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      - name: Build and push Dashboard image
        if: ${{ matrix.image_name == 'catscan-dashboard' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.vars.outputs.image_registry }}/${{ matrix.image_name }}:sha-${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.image_registry }}/${{ matrix.image_name }}:latest
          build-args: |
            APP_VERSION=sha-${{ steps.vars.outputs.short_sha }}
            GIT_SHA=${{ steps.vars.outputs.short_sha }}
            OAUTH2_PROXY_MODE=true
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
