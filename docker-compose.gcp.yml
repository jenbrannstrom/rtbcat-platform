# GCP/Cloud deployment: API + Dashboard only
# Nginx + OAuth2 Proxy handle SSL and authentication externally
#
# Usage: docker compose -f docker-compose.gcp.yml up -d
#
# Environment variables (set in .env or shell):
#   IMAGE_REGISTRY  - Container registry (default: build locally)
#   IMAGE_TAG       - Image version tag (default: latest)
#   DATA_DIR        - Host path for persistent data (default: ~/.catscan)
#   GMAIL_IMPORT_SECRET - Secret for Gmail webhook (optional)

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-catscan}/catscan-api:${IMAGE_TAG:-latest}
    container_name: catscan-api
    init: true
    stop_grace_period: 30s
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - "${DATA_DIR:-~/.catscan}:/home/rtbcat/.catscan"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/home/rtbcat/.catscan/credentials/google-credentials.json
      # DATABASE_PATH removed - using Postgres via POSTGRES_DSN from .env
      - POSTGRES_DSN=${POSTGRES_DSN}
      - POSTGRES_SERVING_DSN=${POSTGRES_SERVING_DSN}
      - OAUTH2_PROXY_ENABLED=true
      - GMAIL_IMPORT_SECRET=${GMAIL_IMPORT_SECRET:-}
      - PRECOMPUTE_REFRESH_SECRET=${PRECOMPUTE_REFRESH_SECRET:-}
      - PRECOMPUTE_MONITOR_SECRET=${PRECOMPUTE_MONITOR_SECRET:-}
      - PRECOMPUTE_REFRESH_DAYS=${PRECOMPUTE_REFRESH_DAYS:-2}
      - PRECOMPUTE_REFRESH_MAX_AGE_HOURS=${PRECOMPUTE_REFRESH_MAX_AGE_HOURS:-36}
      - BIGQUERY_PROJECT_ID=${BIGQUERY_PROJECT_ID:-}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-}
      # GCS bucket for Parquet export pipeline
      - CATSCAN_GCS_BUCKET=${CATSCAN_GCS_BUCKET:-}
      - RAW_PARQUET_BUCKET=${RAW_PARQUET_BUCKET:-}
      - CATSCAN_BQ_DATASET=${CATSCAN_BQ_DATASET:-}
      - CATSCAN_BQ_PROJECT=${CATSCAN_BQ_PROJECT:-}
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-catscan}/catscan-dashboard:${IMAGE_TAG:-latest}
    container_name: catscan-dashboard
    init: true
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - OAUTH2_PROXY_MODE=true
    depends_on:
      - api
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
