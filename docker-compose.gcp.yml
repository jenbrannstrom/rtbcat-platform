# GCP deployment: API + Dashboard only
# Nginx + OAuth2 Proxy handle SSL and authentication externally
#
# Usage: docker compose -f docker-compose.gcp.yml up -d

services:
  api:
    image: ${IMAGE_REGISTRY:-europe-west1-docker.pkg.dev/catscan-prod-202601/catscan}/catscan-api:${IMAGE_TAG:-latest}
    container_name: catscan-api
    init: true
    stop_grace_period: 30s
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${DATA_DIR:-/home/catscan/.catscan}:/home/rtbcat/.catscan
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/home/rtbcat/.catscan/credentials/google-credentials.json
      - DATABASE_PATH=/home/rtbcat/.catscan/catscan.db
      - OAUTH2_PROXY_ENABLED=true
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    image: ${IMAGE_REGISTRY:-europe-west1-docker.pkg.dev/catscan-prod-202601/catscan}/catscan-dashboard:${IMAGE_TAG:-latest}
    container_name: catscan-dashboard
    init: true
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - OAUTH2_PROXY_MODE=true
    depends_on:
      - api
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
