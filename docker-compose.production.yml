# Production compose with Caddy reverse proxy for HTTPS
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    container_name: catscan-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - CATSCAN_AUTH_COOKIE=${CATSCAN_AUTH_COOKIE:?CATSCAN_AUTH_COOKIE is required}
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-}
      - BASIC_AUTH_HASH=${BASIC_AUTH_HASH:-}
    depends_on:
      - dashboard
      - api
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_VERSION=${IMAGE_TAG:-unknown}
    container_name: catscan-api
    init: true
    stop_grace_period: 30s
    expose:
      - "8000"
    volumes:
      - ${DATA_DIR:-/home/catscan/.catscan}:/home/rtbcat/.catscan
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/home/rtbcat/.catscan/credentials/google-credentials.json
      - CATSCAN_API_KEY=${CATSCAN_API_KEY:-}
      - RTBCAT_ADMIN_EMAIL=${RTBCAT_ADMIN_EMAIL:-}
      - RTBCAT_ADMIN_PASSWORD=${RTBCAT_ADMIN_PASSWORD:-}
      - APP_VERSION=${IMAGE_TAG:-unknown}
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - API_HOST=api
        - APP_VERSION=${IMAGE_TAG:-unknown}
    container_name: catscan-dashboard
    init: true
    expose:
      - "3000"
    environment:
      - API_HOST=api
      - NEXT_PUBLIC_API_KEY=${CATSCAN_API_KEY:-}
      - NEXT_PUBLIC_APP_VERSION=${IMAGE_TAG:-unknown}
    depends_on:
      - api
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy-data:
  caddy-config:
